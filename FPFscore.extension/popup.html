<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preenchimento Automático</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            width: 250px;
        }
        textarea {
            width: 100%;
            height: 150px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h3>Ficha de Jogo</h3>
    <textarea id="dadosFicha" placeholder="Cola aqui a ficha de jogo..."></textarea>
    <button id="preencher">Preencher Site</button>
    <script src="popup.js"></script>
</body>
</html>
